services:
  - type: web
    name: nullspace-ai-server
    runtime: docker
    plan: starter
    healthCheckPath: /api/health
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 3000
      - key: DATABASE_URL
        sync: false
      - key: OPENAI_API_KEY
        sync: false
      - key: OPENAI_MODEL
        value: gpt-4.1-mini
      - key: AI_PROVIDER
        value: openai
      - key: JWT_SECRET
        generateValue: true
      - key: APP_URL
        sync: false
      - key: ALLOWED_ORIGINS
        sync: false
